<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Furnishing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Add Furnishing</h2>
        
        <div class="nav-links">
            <a href="/" class="nav-link back">🏠 Dashboard</a>
            <a href="/flats" class="nav-link back">🏢 View Flats</a>
        </div>

        <form method="POST">
            <div class="form-group">
                <label>Select Flat:</label>
                <select name="flat_id" required>
                    <option value="">Choose a flat</option>
                    {% for f in flats %}
                        <option value="{{ f[0] }}">{{ f[1] }} - Flat {{ f[2] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label style="margin-bottom: 15px;">Select Furnishing Items:</label>
                <div style="background: white; padding: 20px; border-radius: 10px; border: 2px solid var(--border-color);">
                    {% for item in items %}
                    <div class="checkbox-group">
                        <input type="checkbox" name="items" value="{{ item[0] }}" id="item_{{ item[0] }}">
                        <label for="item_{{ item[0] }}">{{ item[1] }}</label>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <button type="submit">💾 Save Furnishing</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
