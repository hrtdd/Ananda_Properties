<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Rent Payment</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>💰 Add Rent Payment</h2>
        
        <div class="nav-links">
            <a href="/" class="nav-link back">🏠 Dashboard</a>
            <a href="/tenant-profile/{{ tenant_id }}" class="nav-link back">👤 Back to Profile</a>
        </div>

        <form method="POST">
            <div class="form-group">
                <label>Amount Paid (₹):</label>
                <input type="number" name="amount_paid" required placeholder="Enter amount paid" min="0">
            </div>

            <div class="form-group">
                <label>Month For:</label>
                <input type="text" name="month_for" placeholder="e.g. January 2026">
            </div>

            <div class="form-group">
                <label>Notes (Optional):</label>
                <textarea name="notes" placeholder="Any additional notes about this payment..."></textarea>
            </div>

            <button type="submit">💾 Save Payment</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
