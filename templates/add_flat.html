<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Flat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Add Flat</h2>
        
        <div class="nav-links">
            <a href="/" class="nav-link back">🏠 Dashboard</a>
            <a href="/buildings" class="nav-link back">📋 View Buildings</a>
            <a href="/flats" class="nav-link back">🏢 View Flats</a>
        </div>

        <form method="POST">
            <div class="form-group">
                <label>Building:</label>
                <select name="building_id" required>
                    <option value="">Select a building</option>
                    {% for b in buildings %}
                        <option value="{{ b[0] }}">{{ b[2] }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Floor No:</label>
                <input type="number" name="floor_no" required placeholder="Enter floor number" min="0">
            </div>

            <div class="form-group">
                <label>Flat No:</label>
                <input type="text" name="flat_no" required placeholder="Enter flat number">
            </div>

            <div class="form-group">
                <label>BHK:</label>
                <input type="text" name="bhk" placeholder="1BHK / 2BHK / 3BHK" required>
            </div>

            <div class="form-group">
                <label>Area (sqft):</label>
                <input type="number" name="area_sqft" placeholder="Enter area in square feet" min="0">
            </div>

            <div class="form-group">
                <label>Rent Amount:</label>
                <input type="number" name="rent_amount" required placeholder="Enter rent amount" min="0">
            </div>

            <div class="form-group">
                <label>Security Deposit:</label>
                <input type="number" name="security_deposit" placeholder="Enter security deposit" min="0">
            </div>

            <button type="submit">💾 Save Flat</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
