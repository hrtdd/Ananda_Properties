<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Upload Document</h2>
        
        {% if doc_type %}
        <p style="color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 20px;">
            Document Type: <strong style="color: var(--primary-color);">{{ doc_type }}</strong>
        </p>
        {% endif %}
        
        <div class="nav-links">
            <a href="/" class="nav-link back">🏠 Dashboard</a>
            {% if tenant_id %}
            <a href="/tenant-profile/{{ tenant_id }}" class="nav-link back">⬅ Back to Profile</a>
            {% else %}
            <a href="/tenant-documents" class="nav-link back">🔍 Back to Search</a>
            {% endif %}
        </div>

        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Select Document:</label>
                <input 
                    type="file" 
                    name="document" 
                    accept=".jpg,.jpeg,.png,.pdf"
                    required
                >
                <small style="color: var(--text-secondary); display: block; margin-top: 8px;">
                    Supported formats: JPG, PNG, PDF. Maximum file size recommended: 10MB
                </small>
            </div>

            <button type="submit">📤 Upload Document</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
