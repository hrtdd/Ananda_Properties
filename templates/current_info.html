<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Info - Buildings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>📊 Current Info - Buildings</h2>
        
        <div class="nav-links">
            <a href="/" class="nav-link back">🏠 Dashboard</a>
        </div>

        {% if buildings %}
        <div class="buildings-grid">
            {% for b in buildings %}
            <a href="/building-info/{{ b[0] }}" class="building-card">
                <div class="building-icon">🏢</div>
                <h3>{{ b[1] }}</h3>
                <p>Click to view tenant & rent details</p>
            </a>
            {% endfor %}
        </div>
        {% else %}
        <div style="text-align: center; padding: 40px; color: var(--text-secondary);">
            <div style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;">🏢</div>
            <p style="font-size: 1.2rem;">No buildings found. <a href="/add-building">Add your first building</a></p>
        </div>
        {% endif %}
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
