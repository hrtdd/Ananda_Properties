<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Flat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Edit Flat</h2>
        
        <div class="nav-links">
            <a href="/" class="nav-link back">🏠 Dashboard</a>
            <a href="/flats" class="nav-link back">🏢 View Flats</a>
        </div>

        <form method="POST">
            <div class="form-group">
                <label>Floor No:</label>
                <input type="number" name="floor_no" value="{{ flat[0] }}" required min="0">
            </div>

            <div class="form-group">
                <label>Flat No:</label>
                <input type="text" name="flat_no" value="{{ flat[1] }}" required>
            </div>

            <div class="form-group">
                <label>BHK:</label>
                <input type="text" name="bhk" value="{{ flat[2] }}" required placeholder="1BHK / 2BHK / 3BHK">
            </div>

            <div class="form-group">
                <label>Rent Amount:</label>
                <input type="number" name="rent_amount" value="{{ flat[3] }}" required min="0">
            </div>

            <div class="form-group">
                <label>Status:</label>
                <select name="is_occupied" required>
                    <option value="true" {% if flat[4] %}selected{% endif %}>Occupied</option>
                    <option value="false" {% if not flat[4] %}selected{% endif %}>Vacant</option>
                </select>
            </div>

            <button type="submit">💾 Update Flat</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
