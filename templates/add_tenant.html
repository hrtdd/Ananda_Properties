<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Tenant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h2>Add Tenant</h2>
        
        <div class="nav-links">
            <a href="/" class="nav-link back">🏠 Dashboard</a>
            <a href="/flats" class="nav-link back">🏢 View Flats</a>
            <a href="/tenants" class="nav-link back">👥 View Tenants</a>
        </div>

        <form method="POST">
            <div class="form-group">
                <label>Select Flat:</label>
                <select name="flat_id" required>
                    <option value="">Choose a vacant flat</option>
                    {% for f in flats %}
                        <option value="{{ f[0] }}">
                            {{ f[1] }} - Flat {{ f[2] }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Tenant Name:</label>
                <input type="text" name="full_name" required placeholder="Enter tenant's full name">
            </div>

            <div class="form-group">
                <label>Mobile:</label>
                <input type="tel" name="mobile" required placeholder="Enter mobile number">
            </div>

            <div class="form-group">
                <label>Profession:</label>
                <input type="text" name="profession" placeholder="Enter profession (optional)">
            </div>

            <div class="form-group">
                <label>Family / Bachelor:</label>
                <select name="is_family" required>
                    <option value="true">Family</option>
                    <option value="false">Bachelor</option>
                </select>
            </div>

            <button type="submit">💾 Save Tenant</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
